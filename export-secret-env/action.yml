name: 'Export selected secrets'
description: 'Export selected GitHub Actions secrets to later steps as environment variables'

inputs:
  secret-env-map:
    description: 'Newline-separated SECRET_NAME or ENV_NAME=SECRET_NAME entries'
    default: ''
    required: false

runs:
  using: 'composite'
  steps:
  - name: Export selected secret env vars
    if: ${{ inputs.secret-env-map != '' }}
    shell: bash -l {0}
    env:
      PYIRON_SECRET_ENV_MAP: ${{ inputs.secret-env-map }}
    run: python "$GITHUB_ACTION_PATH/../.support/export_secret_env.py"
